<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pattern Matching App</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            font-family:Arial, sans-serif;

            background: linear-gradient(135deg,#4facfe,#00f2fe);

        }

        .container{

            width:400px;
            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:0 10px 25px rgba(0,0,0,0.2);

            text-align:center;

        }

        h1{

            margin-bottom:25px;
            color:#333;

        }

        input{

            width:100%;

            padding:14px;

            margin:12px 0;

            border:none;

            border-radius:10px;

            background:#f1f1f1;

            font-size:16px;

            outline:none;

        }

        button{

            width:100%;

            padding:14px;

            margin-top:15px;

            border:none;

            border-radius:10px;

            background:#4facfe;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;

        }

        button:hover{

            background:#007bff;

            transform:scale(1.03);

        }

        .result{

            margin-top:25px;

            background:#f7f7f7;

            padding:15px;

            border-radius:10px;

        }

        .result h3{

            margin:10px 0;
            color:#333;

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Pattern Matching</h1>

        <form method="POST">

            <input
                type="text"
                name="text"
                placeholder="Enter Text"
                required
            >

            <input
                type="text"
                name="pattern"
                placeholder="Enter Pattern"
                required
            >

            <button type="submit">
                Search Pattern
            </button>

        </form>

        {% if result != "" %}

        <div class="result">

            <h3>Pattern Position : {{ result }}</h3>

            <h3>Execution Time : {{ execution_time }} sec</h3>

        </div>

        {% endif %}

    </div>

</body>

</html><!DOCTYPE html>

</html>
